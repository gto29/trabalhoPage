<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <style>
        /* CONFIGURAÇÕES GERAIS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-principal: #0f0c1b;
            --bg-card: #181528;
            --cor-texto: #f4f4f6;
            --cor-mutada: #9d9aa4;
            --cor-destaque: #8b5cf6;
            --cor-efeito: #a78bfa;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--cor-texto);
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* CABEÇALHO */
        header {
            padding: 30px 0;
            border-bottom: 1px solid #231f39;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--cor-destaque);
        }

        nav a {
            color: var(--cor-mutada);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--cor-texto);
        }

        /* HERO SECTION (INTRODUÇÃO) */
        .hero {
            padding: 100px 0 80px 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .hero h1 span {
            color: var(--cor-destaque);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--cor-mutada);
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .btn {
            display: inline-block;
            background-color: var(--cor-destaque);
            color: #fff;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background-color: var(--cor-efeito);
            transform: translateY(-2px);
        }

        /* SEÇÃO SOBRE MIM */
        .sobre {
            padding: 60px 0;
            background-color: var(--bg-card);
            border-radius: 16px;
            margin: 40px auto;
        }

        .sobre-conteudo {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 0 20px;
        }

        .secao-titulo {
            font-size: 2rem;
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .secao-titulo::after {
            content: '';
            display: block;
            width: 50%;
            height: 4px;
            background-color: var(--cor-destaque);
            margin: 8px auto 0 auto;
            border-radius: 2px;
        }

        /* SEÇÃO PROJETOS */
        .projetos {
            padding: 80px 0;
        }

        .grid-projetos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card-projeto {
            background-color: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #231f39;
            transition: transform 0
