<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Augusto Gonçalves - Portfólio</title>
    <style>
        /* CONFIGURAÇÕES GERAIS / PALETA CLARA (ESTILO GOOGLE SITES) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-principal: #ffffff;
            --bg-secao-alternativa: #f8f9fa;
            --bg-card: #ffffff;
            --border-color: #dadce0;
            --cor-texto: #3c4043;
            --cor-titulo: #1f1f1f;
            --cor-destaque: #1a73e8; /* Azul padrão Google */
            --cor-hover: #1557b0;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--cor-texto);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* CABEÇALHO */
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-principal);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--cor-titulo);
        }

        nav a {
            color: var(--cor-texto);
            text-decoration: none;
            margin-left: 24px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--cor-destaque);
        }

        /* SEÇÃO HERO / APRESENTAÇÃO */
        .hero {
            padding: 60px 0 30px 0;
        }

        .hero h1 {
            font-size: 2.8rem;
            color: var(--cor-titulo);
            margin-bottom: 16px;
            font-weight: 400;
        }

        .info-rapida {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            background-color: var(--bg-secao-alternativa);
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .info-item a {
            color: var(--cor-destaque);
            text-decoration: none;
        }

        .info-item a:hover {
            text-decoration: underline;
        }

        /* SEÇÕES GERAIS */
        .secao {
            padding: 50px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .secao.alternativa {
            background-color: var(--bg-secao-alternativa);
            border-bottom: 1px solid var(--border-color);
            width: 100%;
        }

        .secao-titulo {
            font-size: 1.8rem;
            color: var(--cor-titulo);
            margin-bottom: 24px;
            font-weight: 400;
        }

        .sobre-texto {
            font-size: 1.1rem;
            color: var(--cor-texto);
            text-align: left;
            max-width: 800px;
        }

        /* GRID DE PROJETOS */
        .grid-projetos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 10px;
        }

        .card-projeto {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
