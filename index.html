<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu PortfolioHUB Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen flex flex-col justify-between">

    <header class="p-6 bg-gray-900 border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-500 flex items-center gap-2">
            <span>🔒</span> PortfolioHUB Protegido
        </h1>
        <span id="rate-limit-badge" class="text-xs bg-blue-900/50 text-blue-400 px-3 py-1 rounded-full border border-blue-800">
            Token Mascarado
        </span>
    </header>

    <main class="max-w-5xl w-full mx-auto p-6 space-y-8 flex-grow">
        <section id="perfil-section" class="bg-gray-900 p-6 rounded-xl border border-gray-800 flex flex-col md:flex-row items-center gap-6 animate-pulse">
            <div class="w-24 h-24 bg-gray-800 rounded-full"></div>
            <div class="text-center md:text-left space-y-2 flex-1">
                <div class="h-6 bg-gray-800 rounded w-1/4 mx-auto md:mx-0"></div>
                <div class="h-4 bg-gray-800 rounded w-3/4 mx-auto md:mx-0"></div>
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-xl font-semibold text-gray-300">📁 Meus Repositórios em Destaque</h2>
            <div id="repos-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="p-4 bg-gray-900 border border-gray-800 rounded-lg h-32 animate-pulse"></div>
            </div>
        </section>
    </main>

    <footer class="p-4 bg-gray-900 border-t border-gray-800 text-center text-xs text-gray-500">
        &copy; 2026 PortfolioHUB - Dados Blindados e Sanitizados
    </footer>

    <script>
        // Lembre-se de colocar o SEU nome de usuário do GitHub aqui!
        const SEU_USUARIO_GITHUB = "gto29"; 

        // Função de Segurança: Evita que textos maliciosos executem códigos no seu site (Anti-XSS)
        function limparTexto(texto) {
            if (!texto) return '';
            const div = document.createElement('div');
            div.innerText = texto;
            return div.innerHTML;
        }

        async function carregarPortfolio() {
            try {
                // AGORA É SEGURO: Chamamos a nossa própria API interna da Vercel, e não o GitHub direto!
                const resposta = await fetch(`/api/github?username=${SEU_USUARIO_GITHUB}`);
                const dados = await resposta.json();

                if (dados.error) {
                    document.getElementById('repos-container').innerHTML = `<p class="text-red-400">Erro: ${dados.error}</p>`;
                    return;
                }

                const { perfil, repos } = dados;

                // Aplicando os dados na tela com a proteção de limparTexto()
                document.getElementById('perfil-section').classList.remove('animate-pulse');
                document.getElementById('perfil-section').innerHTML = `
                    <img src="${perfil.avatar_url}" alt="${limparTexto(perfil.name)}" class="w-24 h-24 rounded-full border-2 border-blue-500 shadow-lg">
                    <div class="text-center md:text-left">
                        <h2 class="text-2xl font-bold text-white">${limparTexto(perfil.name || perfil.login)}</h2>
                        <p class="text-gray-400 mt-1">${limparTexto(perfil.bio || 'Desenvolvedor no PortfolioHUB.')}</p>
                        <div class="mt-3 flex justify-center md:justify-start gap-4 text-sm text-gray-500">
                            <span>👥 ${perfil.followers} seguidores</span>
                            <span>📦 ${perfil.public_repos} projetos</span>
                        </div>
                    </div>
                `;

                const container = document.getElementById('repos-container');
                container.innerHTML = '';

                repos.forEach(repo => {
                    container.innerHTML += `
                        <a href="${repo.html_url}" target="_blank" class="p-5 bg-gray-900 border border-gray-800 rounded-xl hover:border-blue-500 transition-all duration-300 group flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-lg text-blue-400 group-hover:text-blue-300">
                                    📘 ${limparTexto(repo.name)}
                                </h3>
                                <p class="text-sm text-gray-400 mt-2 line-clamp-2">${limparTexto(repo.description || 'Sem descrição disponível.')}</p>
                            </div>
                            <div class="mt-4 flex items-center gap-4 text-xs text-gray-500">
                                <span class="bg-gray-800 px-2 py-0.5 rounded text-gray-300">${limparTexto(repo.language || 'Geral')}</span>
                            </div>
                        </a>
                    `;
                });

            } catch (erro) {
                console.error("Erro ao carregar dados seguros:", erro);
            }
        }

        carregarPortfolio();
    </script>
</body>
</html>
